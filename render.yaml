 
databases:
  - name: mpiproject
    databaseName: mpiproject
    user: mpiproject

services:
  - type: web
    name: mpiproject
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn mpiproject.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mpiproject
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
